bio: |
  I am an Assistant Researcher at the School of Artificial Intelligence, Shanghai Jiao Tong University, where I work with Prof. [Junchi Yan](https://thinklab.sjtu.edu.cn/index.html) at [RethinkLab](https://thinklab.sjtu.edu.cn/index.html). I study how to build AI systems that can automate long-horizon, effort-intensive, and creativity-demanding tasks such as research, engineering, and development. My current work focuses on autonomous agents, large language models, and AI4Research. Before joining SJTU, I received my PhD in Data Science from Fudan University and completed postdoctoral research at Tsinghua University ([THUNLP](https://nlp.csai.tsinghua.edu.cn/)), working with Prof. [Zhiyuan Liu](https://nlp.csai.tsinghua.edu.cn/~lzy/) and Prof. [Maosong Sun](https://nlp.csai.tsinghua.edu.cn/staff/sms/). I was also a research intern at the [Machine Learning Research Group](https://www.microsoft.com/en-us/research/group/machine-learning-research-group/?lang=zh-cn) of Microsoft Research Asia, mentored by [Xiao Yang](https://github.com/you-n-g), and at the Institute for Interdisciplinary Information Sciences ([IIIS](https://iiis.tsinghua.edu.cn/en/)), Tsinghua University, working with Prof. [Yang Yu](https://scholar.google.com/citations?user=JfA0a04AAAAJ&hl=en).

