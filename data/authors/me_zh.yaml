bio: |
  陈颢天现任上海交通大学人工智能学院助理研究员，在 [RethinkLab](https://thinklab.sjtu.edu.cn/index.html) 与 [严骏驰](https://thinklab.sjtu.edu.cn/index.html) 教授合作开展研究。他的研究目标是理解并发展能够自动完成长期、复杂且需要创造性思考任务的人工智能系统，重点关注自主智能体、大语言模型与 AI4Research。他于复旦大学获得数据科学博士学位，并在清华大学 [THUNLP](https://nlp.csai.tsinghua.edu.cn/) 开展博士后研究，与 [刘知远](https://nlp.csai.tsinghua.edu.cn/~lzy/) 教授和 [孙茂松](https://nlp.csai.tsinghua.edu.cn/staff/sms/) 教授合作。曾在微软亚洲研究院担任科研实习生，参与研发的 RD-Agent 登上微软 Build 2025 全球 Keynote。

