bio: 陈颢天现任上海交通大学人工智能学院助理研究员，在 RethinkLab 与严骏驰教授合作开展研究。其研究目标是理解并发展能够自动完成长期、复杂且需要创造性思考任务的人工智能系统，重点关注自主智能体、大语言模型与
  AI4Research。他于复旦大学获得数据科学博士学位，并在清华大学自然语言处理与社会人文计算实验室（THUNLP）开展博士后研究，与刘知远教授和孙茂松教授合作。曾在微软亚洲研究院担任科研实习生，参与研发的
  RD-Agent 登上微软 Build 2025 全球 Keynote。
