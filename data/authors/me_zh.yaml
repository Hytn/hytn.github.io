bio: |
  我目前在上海交通大学人工智能学院担任助理研究员，在 [RethinkLab](https://thinklab.sjtu.edu.cn/index.html) 与 [严骏驰](https://thinklab.sjtu.edu.cn/index.html) 教授合作开展研究。我关注如何构建能够自动完成科研、工程与开发等长期复杂任务的人工智能系统，当前主要聚焦自主智能体、大语言模型与 AI4Research。在加入上海交大之前，我于复旦大学获得数据科学博士学位，并在清华大学 [THUNLP](https://nlp.csai.tsinghua.edu.cn/) 与 [刘知远](https://nlp.csai.tsinghua.edu.cn/~lzy/) 教授、[孙茂松](https://nlp.csai.tsinghua.edu.cn/staff/sms/) 教授合作开展博士后研究。我也曾在微软亚洲研究院[机器学习组](https://www.microsoft.com/en-us/research/group/machine-learning-research-group/?lang=zh-cn)担任科研实习生，导师为 [杨骁](https://github.com/you-n-g)；在清华大学[交叉信息研究院](https://iiis.tsinghua.edu.cn/)与[于洋](https://scholar.google.com/citations?user=JfA0a04AAAAJ&hl=en)教授合作研究。

